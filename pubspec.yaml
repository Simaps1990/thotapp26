name: thot
description: "THOT est un carnet de tir numérique pour organiser vos sessions, votre matériel et vos statistiques en toute simplicité."
publish_to: "none"
version: 1.3.7+38

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  crypto: ^3.0.3
  pointycastle: ^3.9.1
  flutter_svg: ^2.0.0
  web: ^1.0.0
  http: ^1.6.0
  shared_preferences: ^2.0.0
  gap: ^3.0.0
  percent_indicator: ^4.0.0
  intl: 0.20.2
  fl_chart: ^1.2.0
  google_fonts: ^8.0.0
  provider: ^6.1.2
  go_router: ^17.2.2
  share_plus: ^12.0.0
  file_picker: ^11.0.2
  image_picker: ^1.1.2
  path_provider: ^2.0.0
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.0.0
  url_launcher: ^6.0.0
  open_filex: ^4.5.0
  pdf: ^3.12.0
  printing: ^5.13.0
  package_info_plus: ^9.0.1
  purchases_flutter: ^10.0.1
  purchases_ui_flutter: ^10.0.1
  audioplayers: ^6.0.0
  vibration: ^3.1.8
  permission_handler: ^12.0.1
  noise_meter: ^5.1.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^5.0.2
  wakelock_plus: ^1.4.0
  in_app_update: ^4.2.2
  connectivity_plus: ^6.1.4
  home_widget: ^0.8.0
  video_player: ^2.9.0
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/audio/
    - assets/icon/
    - assets/video/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true

  image_path: "assets/icon/icon.png"

  adaptive_icon_background: "#505136"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon/icon_monochrome.png"

  min_sdk_android: 24